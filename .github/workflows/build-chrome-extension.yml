name: Build Chrome Extension

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Get extension version
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT

      - name: Create ZIP for Chrome Web Store
        run: |
          cd dist
          zip -r ../turbo-flow-v${{ steps.version.outputs.version }}.zip .
          cd ..

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: turbo-flow-v${{ steps.version.outputs.version }}
          path: turbo-flow-v${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: turbo-flow-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
